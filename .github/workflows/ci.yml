name: GH-Actions
on:
    push:
        branches:
            - "**"
    pull_request:
        branches:
            - "**"
jobs:
    ruby_service_build:
        runs-on: localdev-e2e-test-1775911818-main
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                clean: true
            - name: Install Ruby dependencies
              run: |
                apt-get update && apt-get install -y ruby ruby-bundler ruby-dev build-essential libpq-dev
            - name: Bundle install
              run: bundle update && bundle install --jobs 4
            - name: Ruby version check
              run: ruby --version
            - name: Run tests
              run: |
                bundle exec rake || true
            - name: Bundle audit
              run: |
                gem install bundler-audit --no-document
                bundle audit update
                bundle audit check || true
